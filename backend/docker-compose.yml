services:
  api-server:
    build:
      context: .
    container_name: questbook-api-server
    restart: on-failure
    ports:
      - 8080:8080
    environment:
      DATABASE_URL: postgres://admin:password@postgres:5432/questbook?sslmode=disable
      REDIS_URL: redis:6379
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy