name: Backend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'

permissions:
    contents: read

jobs:
  lint-and-format:
    name: Lint and Format Go
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.4'
          cache-dependency-path: backend/go.sum

      - name: Run golangci-lint (Linting and Formatting)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.0
          working-directory: backend

  lint-sql:
    name: Lint and Format SQL
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
    
      - name: Run ls-lint
        uses: ls-lint/action@v2
        with:
          workdir: backend
          config: backend/.ls-lint.yml

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install SQLFluff
        run: pip install sqlfluff==4.1.0

      - name: Run SQLFluff
        run: sqlfluff lint backend/migrations --config backend/.sqlfluff --format github-annotation-native